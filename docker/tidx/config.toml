# tidx configuration for indexing X Layer

[http]
enabled = true
port = 8080
bind = "0.0.0.0"

[prometheus]
enabled = true
port = 9090

[[chains]]
name = "xlayer-testnet"
chain_id = 195
rpc_url = "https://testrpc.xlayer.tech"
pg_url = "postgres://tidx:tidx@postgres:5432/tidx"
backfill = true
batch_size = 100
