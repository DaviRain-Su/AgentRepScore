# tidx indexer for X Layer chain data
# Usage:
#   docker compose -f docker/tidx/docker-compose.yml up -d
#   docker compose -f docker/tidx/docker-compose.yml logs -f tidx
#
# API available at http://localhost:8080
# Example query:
#   curl "http://localhost:8080/query?chainId=196&sql=SELECT COUNT(*) FROM txs"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: tidx
      POSTGRES_PASSWORD: tidx
      POSTGRES_DB: tidx
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5433:5432"
    volumes:
      - tidx_pgdata:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - max_wal_size=4GB
      - -c
      - checkpoint_timeout=30min
      - -c
      - synchronous_commit=off
      - -c
      - wal_level=minimal
      - -c
      - max_wal_senders=0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tidx -d postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  tidx:
    image: ghcr.io/tempoxyz/tidx:latest
    platform: linux/amd64
    command:
      - up
      - --config
      - /config.toml
    ports:
      - "18080:8080"
      - "19090:9090"
    volumes:
      - ./config.toml:/config.toml:ro
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RUST_LOG: tidx=info
    restart: on-failure

volumes:
  tidx_pgdata:
